<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Panel — Persona 1</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#eae6dd;--surf:#f5f2ec;--surf2:#ffffff;--surf3:#f0ece4;
  --border:#d4cfc6;--border2:#b8b2a8;
  --text:#1a1a1a;--muted:#6b6660;
  --accent:#7ecdc4;--green:#3aaa6e;--red:#e05252;--warn:#c8860a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;}
#loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px;}
#loader h2{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--accent);}
#loader p{color:var(--muted);font-size:13px;}
.spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.app{max-width:800px;margin:0 auto;padding:24px 16px 80px;}
.hdr{margin-bottom:28px;padding-bottom:18px;border-bottom:1px solid var(--border);}
.hdr-top{display:flex;align-items:center;gap:14px;margin-bottom:8px;}
.avatar{width:48px;height:48px;border-radius:50%;background:#7ecdc422;color:#3a9e96;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:500;flex-shrink:0;}
.hdr h1{font-family:'Playfair Display',serif;font-size:1.7rem;color:var(--accent);}
.hdr p{color:var(--muted);font-size:12px;margin-top:2px;}
.my-badge{display:inline-flex;align-items:center;gap:5px;background:#7ecdc415;border:1px solid var(--accent);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--accent);margin-top:6px;}
.my-badge::before{content:'';width:6px;height:6px;background:var(--accent);border-radius:50%;}
#syncStatus{font-size:12px;color:var(--muted);margin-bottom:16px;min-height:18px;transition:color .3s;}
#syncStatus.saved{color:var(--green);}
#syncStatus.saving{color:var(--warn);}
#syncStatus.error{color:var(--red);}

.stabs{display:flex;gap:3px;margin-bottom:18px;background:var(--surf);border-radius:10px;padding:4px;border:1px solid var(--border);flex-wrap:wrap;}
.stab{padding:7px 13px;border-radius:7px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;transition:all .2s;white-space:nowrap;}
.stab:hover{color:var(--text);}
.stab.active{background:var(--surf2);color:var(--text);border:1px solid var(--border2);}

.card{background:var(--surf);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:16px;}
.card-title{font-size:11px;text-transform:uppercase;letter-spacing:1.3px;color:var(--muted);margin-bottom:14px;font-weight:500;display:flex;align-items:center;justify-content:space-between;}
.card-title b{font-weight:500;color:var(--text);font-size:12px;text-transform:none;letter-spacing:0;}

/* READ-ONLY INFO */
.info-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.info-row:last-child{border-bottom:none;}
.info-row .lbl{color:var(--muted);font-size:12px;}

/* CC VIEW */
.cc-view{background:var(--surf2);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.cc-view-header{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.cc-view-name{font-weight:500;font-size:13px;}
.cc-view-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.chevron{font-size:11px;color:var(--muted);transition:transform .2s;}
.chevron.open{transform:rotate(180deg);}
.cc-view-body{display:none;border-top:1px solid var(--border);padding:14px;}
.cc-view-body.open{display:block;}
.bbar-row{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px;}
.bbar-track{height:8px;background:var(--surf);border-radius:4px;overflow:hidden;border:1px solid var(--border);}
.bbar-fill{height:100%;border-radius:4px;transition:width .4s;}
.bbar-stats{display:flex;justify-content:space-between;font-size:12px;margin-top:6px;font-weight:500;}
.items-view{margin-top:12px;}
.item-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;}
.item-row:last-child{border-bottom:none;}
.item-name{color:var(--text);}
.item-amount{color:var(--muted);font-size:12px;}
.pct-pill{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;}

/* METAS - editable avance */
.meta-card{background:var(--surf2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.meta-name{font-weight:500;font-size:13px;margin-bottom:8px;}
.meta-progress-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.meta-label{font-size:12px;color:var(--muted);min-width:36px;}
.meta-value{font-size:13px;font-weight:500;}
.meta-edit-row{display:flex;align-items:center;gap:8px;margin-top:8px;}
.meta-edit-row label{font-size:12px;color:var(--muted);white-space:nowrap;}
input[type=number].fi-sm{background:var(--surf3);border:1px solid var(--border);border-radius:7px;padding:6px 10px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;width:120px;transition:border-color .2s;}
input[type=number].fi-sm:focus{border-color:var(--border2);}
.pbar-wrap{height:6px;background:var(--surf);border-radius:3px;overflow:hidden;margin-top:6px;}
.pbar{height:100%;border-radius:3px;transition:width .4s;}
.pct-lbl{font-size:11px;color:var(--muted);text-align:right;margin-top:3px;}

.periods{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px;}
.period-btn{padding:5px 11px;border-radius:6px;border:1px solid var(--border);background:var(--surf2);color:var(--muted);cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;transition:all .15s;}
.period-btn.active{border-color:var(--accent);color:var(--accent);}

/* SUMMARY */
.sum-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.sum-stat{background:var(--surf2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;}
.sum-val{font-family:'Playfair Display',serif;font-size:20px;color:var(--accent);}
.sum-lbl{font-size:11px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.8px;}

.save-row{display:flex;align-items:center;gap:10px;margin-top:18px;}
.save-btn{background:linear-gradient(135deg,#7ecdc4,#3a9e96);border:none;border-radius:9px;padding:9px 20px;color:#1a1a1a;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;font-size:13px;transition:opacity .2s;}
.save-btn:hover{opacity:.85;}

.note-box{background:var(--surf2);border:1px solid var(--border);border-radius:10px;padding:14px;font-size:13px;color:var(--text);line-height:1.7;white-space:pre-wrap;min-height:80px;}
.note-empty{color:var(--muted);font-style:italic;}

.mbars{display:flex;gap:5px;align-items:flex-end;height:60px;}
.mbar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.mbar-fill{width:100%;border-radius:3px 3px 0 0;transition:height .4s;min-height:2px;}
.mbar-lbl{font-size:10px;color:var(--muted);}

/* CHECKLIST */
.checklist-section{margin-top:20px;padding-top:18px;border-top:1px solid var(--border);}
.checklist-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.checklist-title{font-size:11px;text-transform:uppercase;letter-spacing:1.3px;color:var(--muted);font-weight:500;}
.checklist-counter{font-size:11px;color:var(--muted);}
.checklist-counter span{color:var(--green);font-weight:500;}
.task-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.task-item:last-child{border-bottom:none;}
.task-check{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--border2);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.task-check.done{background:var(--green);border-color:var(--green);}
.task-check.done::after{content:'✓';font-size:12px;color:#0f0f13;font-weight:700;}
.task-name{flex:1;font-size:13px;}
.task-name.done{color:var(--muted);text-decoration:line-through;}
.task-empty{font-size:13px;color:var(--muted);font-style:italic;padding:8px 0;}

@media(max-width:500px){.sum-grid{grid-template-columns:1fr 1fr;}}

/* ── RENDICIONES ── */
.rend-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.rend-filter-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surf2);color:var(--muted);cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;transition:all .15s;}
.rend-filter-btn.active{border-color:var(--border2);color:var(--text);font-weight:500;}
.rend-item{background:var(--surf2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;}
.rend-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
.rend-title{font-weight:500;font-size:13px;}
.rend-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.rend-badge{font-size:11px;padding:3px 10px;border-radius:12px;font-weight:500;white-space:nowrap;flex-shrink:0;margin-left:8px;}
.badge-pendiente{background:#fff3cd;color:#856404;}
.badge-aprobada{background:#d4edda;color:#155724;}
.badge-rechazada{background:#f8d7da;color:#721c24;}
.badge-pagada{background:#d1ecf1;color:#0c5460;}
.rend-body{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px;margin-bottom:8px;}
.rend-field label{color:var(--muted);display:block;margin-bottom:2px;}
.rend-field span{font-weight:500;}
.rend-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.rend-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surf);color:var(--text);cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;transition:all .15s;}
.rend-btn:hover{background:var(--surf2);}
.rend-form{background:var(--surf2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px;}
.rend-form-title{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:12px;font-weight:500;}
.rend-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.rend-form-grid .full{grid-column:1/-1;}
select.fi{width:100%;background:var(--surf2);border:1px solid var(--border);border-radius:8px;padding:8px 11px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;}
select.fi:focus{border-color:var(--border2);}

.budget-alert{display:flex;align-items:center;gap:8px;background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:8px 12px;font-size:12px;color:#856404;margin-bottom:8px;}
.budget-alert.danger{background:#f8d7da;border-color:#f5c6cb;color:#721c24;}

/* ── PRIORIDAD TAREAS ── */
.prio-select{background:transparent;border:1px solid transparent;outline:none;font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;padding:2px 6px;border-radius:4px;font-weight:500;}
.prio-alta{background:#f8d7da;color:#721c24;}
.prio-media{background:#fff3cd;color:#856404;}
.prio-baja{background:#d4edda;color:#155724;}
.task-counter{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px;}
.task-counter-item{background:var(--surf2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;}
.task-counter-item .val{font-size:18px;font-weight:500;line-height:1;}
.task-counter-item .lbl{font-size:11px;color:var(--muted);margin-top:2px;}
</style>

<body>

<div id="loader">
  <div class="spinner"></div>
  <h2>Cargando tu panel</h2>
  <p>Conectando...</p>
</div>

<div class="app" style="display:none" id="appContainer">
  <div class="hdr">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
      <img id="panelLogo" alt="RUPA" style="height:36px;object-fit:contain;">
      <div class="my-badge">Vista personal · Solo tus datos</div>
    </div>
    <div class="hdr-top">
      <div class="avatar" id="myAvatar">P1</div>
      <div>
        <h1 id="myName">Mi Panel</h1>
        <p id="myRole">Cargo / Área</p>
      </div>
    </div>
  </div>

  <div id="syncStatus">Conectando...</div>

  <div class="stabs" id="mainTabs"></div>
  <div id="mainContent"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="shared.js"></script>
<script>
const PI = 0; // ← PERSONA INDEX: 0 = Persona 1, 1 = Persona 2
let db, data = defaultPersona(PI);
let activeSection=0, activeMonth=0, activeQuarter=0;
const expandedCC={};
let saveTimer=null;

function initFirebase(){
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
    db.ref(`personas/${PI}`).on('value', snap=>{
      const d = snap.val();
      if(d){
        data = {...defaultPersona(PI), ...d};
        if(!data.metasMensuales) data.metasMensuales={};
        if(!data.metasTrimestrales) data.metasTrimestrales={};
        if(!data.centrosCosto) data.centrosCosto=[];
        data.centrosCosto.forEach(cc=>{ if(!cc.items) cc.items=[]; });
      }
      hideLoader(); render();
    });
    setStatus('Conectado','saved');
  } catch(e){
    setStatus('Error de conexión','error');
    hideLoader(); render();
  }
}

function hideLoader(){
  document.getElementById('loader').style.display='none';
  document.getElementById('appContainer').style.display='block';
}
function setStatus(msg,cls){ const el=document.getElementById('syncStatus'); el.textContent=msg; el.className=cls||''; }

function scheduleSave(){
  clearTimeout(saveTimer);
  setStatus('Guardando...','saving');
  saveTimer=setTimeout(()=>{
    if(!db){ setStatus('Sin conexión','error'); return; }
    db.ref(`personas/${PI}`).set(data)
      .then(()=>setStatus('✓ Guardado · '+new Date().toLocaleTimeString('es-CL'),'saved'))
      .catch(()=>setStatus('Error al guardar','error'));
  },800);
}

function updateActual(type,sk,mi,v){
  let ref;
  if(type==='annual') ref=data.metasAnuales;
  else if(type==='monthly'){ if(!data.metasMensuales[sk]) data.metasMensuales[sk]=[]; ref=data.metasMensuales[sk]; }
  else{ if(!data.metasTrimestrales[sk]) data.metasTrimestrales[sk]=[]; ref=data.metasTrimestrales[sk]; }
  if(ref&&ref[mi]) ref[mi].actual=v;
  scheduleSave(); render();
}

function toggleCC(ci){ expandedCC[ci]=!expandedCC[ci]; render(); }
function setMonth(mi){ activeMonth=mi; if(!data.metasMensuales[mi]) data.metasMensuales[mi]=[]; render(); }
function setQuarter(qi){ activeQuarter=qi; if(!data.metasTrimestrales[qi]) data.metasTrimestrales[qi]=[]; render(); }
function setSection(si){ activeSection=si; render(); }

// ── CHECKLIST ──
function getTareasRef(mk){
  if(!data.tareasMensuales) data.tareasMensuales={};
  if(!data.tareasMensuales[mk]) data.tareasMensuales[mk]=[];
  return data.tareasMensuales[mk];
}
function toggleTarea(mk,ti){
  const ref=getTareasRef(mk);
  ref[ti].done=!ref[ti].done;
  scheduleSave(); render();
}
function addTarea(mk){
  const inp=document.getElementById(`newTarea_${mk}`);
  if(!inp||!inp.value.trim()) return;
  getTareasRef(mk).push({name:inp.value.trim(),done:false});
  inp.value=''; scheduleSave(); render();
}
function renderChecklist(mk){
  const tareas=getTareasRef(mk);
  const total=tareas.length;
  const done=tareas.filter(t=>t.done).length;
  const pending=tareas.filter(t=>!t.done);
  const altaPend=pending.filter(t=>(t.prioridad||'media')==='alta').length;
  const mediaPend=pending.filter(t=>(t.prioridad||'media')==='media').length;
  const bajaPend=pending.filter(t=>(t.prioridad||'media')==='baja').length;

  const rows=total ? tareas.map((t,ti)=>{
    const prio=t.prioridad||'media';
    const prioLabel={'alta':'🔴 Alta','media':'🟡 Media','baja':'🟢 Baja'}[prio];
    return `<div class="task-item">
      <div class="task-check ${t.done?'done':''}" onclick="toggleTarea(${mk},${ti})"></div>
      <span class="task-name ${t.done?'done':''}" style="flex:1">${escH(t.name)}</span>
      <select class="prio-select prio-${prio}" onchange="updateTareaPrioridad_p(${mk},${ti},this.value);this.className='prio-select prio-'+this.value">
        ${['alta','media','baja'].map(p=>`<option value="${p}" ${prio===p?'selected':''}>${p.charAt(0).toUpperCase()+p.slice(1)}</option>`).join('')}
      </select>
    </div>`;
  }).join('') : '<div class="task-empty">No hay tareas para este mes.</div>';

  const counter = total ? `<div class="task-counter">
    <div class="task-counter-item">
      <div class="val" style="color:var(--green)">${done}</div>
      <div class="lbl">✓ Completadas</div>
    </div>
    <div class="task-counter-item">
      <div class="val" style="color:var(--muted)">${total-done}</div>
      <div class="lbl">Pendientes</div>
    </div>
    <div class="task-counter-item">
      <div class="val" style="color:#721c24">${altaPend}</div>
      <div class="lbl" style="color:#721c24">🔴 Alta prioridad</div>
    </div>
    <div class="task-counter-item">
      <div class="val" style="color:#856404">${mediaPend}</div>
      <div class="lbl" style="color:#856404">🟡 Media prioridad</div>
    </div>
    <div class="task-counter-item" style="grid-column:1/-1">
      <div class="val" style="color:#155724">${bajaPend}</div>
      <div class="lbl" style="color:#155724">🟢 Baja prioridad</div>
    </div>
  </div>` : '';

  return `<div class="checklist-section">
    <div class="checklist-header">
      <span class="checklist-title">Tareas del mes</span>
      <span class="checklist-counter"><span>${done}</span> / ${total} completadas</span>
    </div>
    ${counter}
    ${rows}
    <div style="display:flex;gap:6px;margin-top:12px">
      <input type="text" style="flex:1;background:var(--surf2);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none" id="newTarea_${mk}" placeholder="Nueva tarea...">
      <button onclick="addTarea(${mk})" style="background:var(--surf2);border:1px solid var(--border2);border-radius:8px;padding:7px 13px;color:var(--text);cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;white-space:nowrap">+ Tarea</button>
    </div>
  </div>`;
}

function calcCC_local(cc){
  const cats=cc.categorias||[];
  const presup=cats.reduce((s,c)=>s+(parseFloat(c.presupuesto)||0),0);
  const used=cats.reduce((s,c)=>s+(c.gastos||[]).reduce((ss,g)=>ss+(parseFloat(g.monto)||0),0),0);
  return {presup,used,avail:presup-used,p:presup>0?Math.min(100,Math.round((used/presup)*100)):0};
}

function renderCCView(cc,ci){
  const s=calcCC_local(cc); const over=s.avail<0; const isOpen=!!expandedCC[ci];
  const bc=over?'var(--red)':s.p>=70?'var(--warn)':'var(--green)';
  const cats=cc.categorias||[];

  const catsHTML=cats.map((cat,ki)=>{
    const catUsed=(cat.gastos||[]).reduce((ss,g)=>ss+(parseFloat(g.monto)||0),0);
    const catPresup=parseFloat(cat.presupuesto)||0;
    const catAvail=catPresup-catUsed;
    const catPct=catPresup>0?Math.min(100,Math.round((catUsed/catPresup)*100)):0;
    const catOver=catAvail<0;
    const catBc=catOver?'var(--red)':catPct>=70?'var(--warn)':'var(--green)';
    const gastos=(cat.gastos||[]).map(g=>`
      <div class="item-row" style="padding:4px 0">
        <span class="item-name" style="font-size:12px">${escH(g.desc||'—')}</span>
        <span class="item-amount">$${fmt(g.monto)}</span>
      </div>`).join('');
    return `<div style="background:var(--surf3);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-size:13px;font-weight:500">${escH(cat.name)}</span>
        <span style="font-size:12px;color:var(--muted)">$${fmt(catPresup)}</span>
      </div>
      ${catPresup?`<div class="bbar-track"><div class="bbar-fill" style="width:${Math.min(100,catPct)}%;background:${catBc}"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-top:4px">
        <span style="color:var(--red)">Usado: $${fmt(catUsed)}</span>
        <span style="color:${catOver?'var(--red)':'var(--green)'}">${catOver?'Excedido':'Disponible'}: $${fmt(Math.abs(catAvail))}</span>
      </div>`:''}

  }).join('');

function renderMeta(m,mi,type,sk){
  const p=pct(parseFloat(m.actual)||0,parseFloat(m.meta)||0);
  const bc=p>=90?'var(--red)':p>=60?'var(--warn)':'var(--green)';
  return `<div class="meta-card">
    <div class="meta-name">${escH(m.name)||'Meta sin nombre'}</div>
    <div class="meta-progress-row">
      <span class="meta-label">Meta:</span><span class="meta-value">${fmt(m.meta)} ${escH(m.unit||'')}</span>
      <span class="meta-label" style="margin-left:14px">Real:</span><span class="meta-value" style="color:${bc}">${fmt(m.actual)} ${escH(m.unit||'')}</span>
    </div>
    <div class="pbar-wrap"><div class="pbar" style="width:${p}%;background:${bc}"></div></div>
    <div class="pct-lbl">${p}% logrado${m.año?' · '+m.año:''}</div>
    <div class="meta-edit-row">
      <label>Actualizar avance:</label>
      <input type="number" class="fi-sm" value="${m.actual||''}" placeholder="Valor real actual"
        onchange="updateActual('${type}',${sk},${mi},this.value)">
      <span style="font-size:12px;color:var(--muted)">${escH(m.unit||'')}</span>
    </div>
  </div>`;
}

function calcSummaryLocal(metas){
  if(!metas||!metas.length) return {total:0,pct:0,logradas:0};
  const tm=metas.reduce((s,m)=>s+(parseFloat(m.meta)||0),0);
  const ta=metas.reduce((s,m)=>s+(parseFloat(m.actual)||0),0);
  const p=tm>0?Math.min(100,Math.round((ta/tm)*100)):0;
  return {total:metas.length,pct:p,logradas:metas.filter(m=>(parseFloat(m.actual)||0)>=(parseFloat(m.meta)||1)).length};
}

function downloadBoletaSola(rid){
  const r = (data.rendiciones||[]).find(x=>x.id===rid);

  const a = document.createElement('a');
  a.href = r.boleta;

function getTareas_r(mk){ // avoid name clash
  if(!data.tareasMensuales) data.tareasMensuales={};
  if(!data.tareasMensuales[mk]) data.tareasMensuales[mk]=[];
  return data.tareasMensuales[mk];
}

function addRend(){
  const f = id => document.getElementById(id);
  const nombre = f('rNombre')?.value.trim();
  const fecha  = f('rFecha')?.value;
  const cc     = f('rCC')?.value;
  const cat    = f('rCat')?.value;
  const desc   = f('rDesc')?.value.trim();
  const monto  = f('rMonto')?.value;
  if(!nombre||!fecha||!desc||!monto){ alert('Completa todos los campos requeridos'); return; }
  if(!data.rendiciones) data.rendiciones=[];
  const fileInp = f('rBoleta');
  const file = fileInp?.files?.[0];
  if(file){
    const reader = new FileReader();
    reader.onload = e => {
      data.rendiciones.push({
        id:Date.now(), nombre, fecha, cc, cat, desc, monto,
        estado:'pendiente', creadoEn:new Date().toLocaleDateString('es-CL'),
        boleta:e.target.result, boletaNombre:file.name
      });
      scheduleSave(); render();
    };
    reader.readAsDataURL(file);
  } else {
    data.rendiciones.push({
      id:Date.now(), nombre, fecha, cc, cat, desc, monto,
      estado:'pendiente', creadoEn:new Date().toLocaleDateString('es-CL')
    });
    scheduleSave(); render();
  }
}

function exportMisRendicionesExcel(){
  const rends = data.rendiciones||[];
  if(!rends.length){ alert('No hay rendiciones para exportar'); return; }
  let csv = '\uFEFF';
  csv += 'Fecha,Descripción,Categoría,Centro de Costo,Monto,Estado,Fecha de Pago,Notas\n';
  rends.forEach(r=>{
    const lastNota = r.historial&&r.historial.length ? r.historial[r.historial.length-1].nota||'' : '';
    const row = [r.fecha||'',r.desc||'',r.cat||'',r.cc||'',r.monto||0,r.estado||'',r.fechaPago||'',lastNota]
      .map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',');
    csv += row + '\n';
  });
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `mis_rendiciones_${new Date().toLocaleDateString('es-CL').replace(/\//g,'-')}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

document.addEventListener('DOMContentLoaded', initFirebase);
</script>
</body>
</html>
